<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

      rel="icon"
      type="image/png"
      href="./src/assets/brandIcon.png"
      sizes="256x256"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Edastra - Interactive Educational Entertainment Platform</title>

    <meta name="author" content="Edastra" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://edastra.com/" />

      property="og:title"
      content="Edastra - Interactive Educational Entertainment Platform"
    />

      property="og:description"

    <meta property="twitter:card" content="summary_large_image" />

      property="twitter:title"
      content="Edastra - Interactive Educational Entertainment Platform"
    />

      property="twitter:description"
      content="Experience the future of education with Edastra. Interactive learning platform combining entertainment and education for students of all ages."
